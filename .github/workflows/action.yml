name: Auto Update RedBeans Files

on:
  schedule:
    - cron: "*/20 * * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r rare.txt

      - name: Run Script
        run: |
          curl -L -o redbeans.py ${{ secrets.RED_BEANS_PYTHON }}
          python redbeans.py

      - name: Changes ko commit karen
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'
          git remote set-url origin https://${{ secrets.GITHUB_TOKEN }}@github.com/abidprobook/famous-redbeans.git
      
      - name: Commit and push changes
        run: |
          git add redbeans.txt
          git fetch origin main
          git reset --soft origin/main
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Fetch redbeans latest data new"
            git push origin main
          fi
      
